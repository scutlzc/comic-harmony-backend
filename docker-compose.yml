version: '3.8'

services:
  # ---- PostgreSQL ----
  db:
    image: postgres:16-alpine
    container_name: comic-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: comic_user
      POSTGRES_PASSWORD: comic_pass
      POSTGRES_DB: comic_harmony
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d  # 自动运行初始迁移
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comic_user -d comic_harmony"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Go 后端 ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comic-backend
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      PORT: "9090"
      DATABASE_URL: postgres://comic_user:comic_pass@db:5432/comic_harmony?sslmode=disable
      JWT_SECRET: comic-harmony-dev-change-me-in-prod
      ALLOWED_ORIGIN: "*"
      DB_HOST: db
      DB_USER: comic_user
      DB_PASSWORD: comic_pass
      DB_NAME: comic_harmony
    volumes:
      - uploads:/uploads
      - ./entrypoint.sh:/entrypoint.sh
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["sh", "/entrypoint.sh"]

volumes:
  pgdata:
  uploads:
